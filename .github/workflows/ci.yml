name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run smoke
      - run: npm run cli
      # Integration tests (tests/integration/) require the real `unitask`
      # binary and QEMU — not available in CI. Run them locally with
      # `npm run integration`.
